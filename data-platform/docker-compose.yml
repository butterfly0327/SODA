services:
  fastapi-prod:
    profiles:
      - prod
    image: python:3.12.10-slim
    container_name: fastapi-prod
    command: ["sh", "-c", "sleep infinity"]
    restart: unless-stopped
    env_file:
      - ../.env.prod
    expose:
      - "8083"
    networks:
      - prod-net

  fastapi-dev:
    profiles:
      - dev
    image: python:3.12.10-slim
    container_name: fastapi-dev
    working_dir: /app
    command: ["sh", "-c", "pip install --no-cache-dir -r /workspace/requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port ${APP_PORT:-8086} --reload"]
    restart: unless-stopped
    env_file:
      - ../.env.dev
    ports:
      - "127.0.0.1:${DEV_FASTAPI_PUBLISHED_PORT:-18086}:${APP_PORT:-8086}"
    expose:
      - "8086"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8086}
      APP_DEBUG: ${APP_DEBUG:-true}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    depends_on:
      dev-postgres-bootstrap:
        condition: service_completed_successfully
      dev-redis:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./api:/app
      - ../requirements.txt:/workspace/requirements.txt:ro
    networks:
      - dev-net
      - common-net
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; urllib.request.urlopen(f\"http://127.0.0.1:{os.getenv('APP_PORT','8086')}/v1/health\")"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  dev-postgres:
    profiles:
      - dev
    image: pgvector/pgvector:pg16
    container_name: dev-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      POSTGRES_DB: ${DEV_POSTGRES_DB:-soda_dev}
      POSTGRES_USER: ${DEV_POSTGRES_USER:-soda}
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD:-change-me}
    volumes:
      - dev-postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DEV_POSTGRES_PUBLISHED_PORT:-15432}:5432"
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEV_POSTGRES_USER:-soda} -d ${DEV_POSTGRES_DB:-soda_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  dev-postgres-bootstrap:
    profiles:
      - dev
    image: pgvector/pgvector:pg16
    container_name: dev-postgres-bootstrap
    restart: "no"
    depends_on:
      dev-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DEV_POSTGRES_PASSWORD:-change-me}
    command:
      [
        "sh",
        "-c",
        "psql -h dev-postgres -U ${DEV_POSTGRES_USER:-soda} -d ${DEV_POSTGRES_DB:-soda_dev} -c 'CREATE EXTENSION IF NOT EXISTS vector;'"
      ]
    networks:
      - dev-net

  dev-redis:
    profiles:
      - dev
    image: redis:7-alpine
    container_name: dev-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    environment:
      TZ: Asia/Seoul
    volumes:
      - dev-redis-data:/data
    ports:
      - "127.0.0.1:${DEV_REDIS_PUBLISHED_PORT:-16379}:6379"
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  minio:
    profiles:
      - dev
    image: minio/minio:latest
    container_name: minio
    command: ["server", "/data", "--console-address", ":9001"]
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
      MINIO_ROOT_USER: ${DEV_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${DEV_MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:${DEV_MINIO_API_PUBLISHED_PORT:-19000}:9000"
      - "127.0.0.1:${DEV_MINIO_CONSOLE_PUBLISHED_PORT:-19001}:9001"
    expose:
      - "9000"
      - "9001"
    networks:
      - dev-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  minio-bootstrap:
    profiles:
      - dev
    image: minio/mc:latest
    container_name: minio-bootstrap
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    depends_on:
      minio:
        condition: service_started
    command:
      - "until mc alias set local ${DEV_MINIO_ENDPOINT:-http://minio:9000} ${DEV_MINIO_ACCESS_KEY:-minioadmin} ${DEV_MINIO_SECRET_KEY:-minioadmin}; do sleep 2; done; mc mb --ignore-existing local/${S3_BUCKET:-soda-dev}"
    networks:
      - dev-net

networks:
  prod-net:
    external: true
  dev-net:
    external: true
  common-net:
    external: true

volumes:
  dev-postgres-data:
  dev-redis-data:
  minio-data:
