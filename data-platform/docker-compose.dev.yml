services:
  codex-adapter-dev:
    profiles:
      - dev
    build:
      context: ..
      dockerfile: data-platform/codex_adapter/Dockerfile.dev
    image: soda-codex-adapter:dev
    container_name: codex-adapter-dev
    env_file:
      - ../.env.dev
    environment:
      ADAPTER_APP_ENV: ${APP_ENV:-dev}
      ADAPTER_APP_HOST: 0.0.0.0
      ADAPTER_APP_PORT: 8091
      CODEX_COMMAND: ${CODEX_COMMAND:-codex}
      CODEX_HOME_PATH: /root/.codex
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5.4}
      CODEX_TIMEOUT_SECONDS: ${CODEX_TIMEOUT_SECONDS:-45}
      CODEX_MAX_CONCURRENCY: ${CODEX_MAX_CONCURRENCY:-1}
      CODEX_MAX_QUEUE: ${CODEX_MAX_QUEUE:-100}
    volumes:
      - ${CODEX_HOME_HOST_PATH:-./codex_adapter/dev-empty-home}:/root/.codex
    expose:
      - "8091"
    networks:
      - dev-net
      - common-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
