services:
  spring-blue:
    profiles:
      - prod
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: soda-backend:prod
    command: null
    expose:
      - "${PROD_BLUE_PORT:-8081}"
    environment:
      SERVER_PORT: ${PROD_BLUE_PORT:-8081}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      TZ: Asia/Seoul
      JAVA_OPTS: -Xms1024m -Xmx2048m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:${PROD_BLUE_PORT:-8081}/health || true); [ \"$$code\" = \"200\" ] || [ \"$$code\" = \"401\" ]"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  spring-green:
    profiles:
      - prod
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: soda-backend:prod
    command: null
    expose:
      - "${PROD_GREEN_PORT:-8082}"
    environment:
      SERVER_PORT: ${PROD_GREEN_PORT:-8082}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      TZ: Asia/Seoul
      JAVA_OPTS: -Xms1024m -Xmx2048m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:${PROD_GREEN_PORT:-8082}/health || true); [ \"$$code\" = \"200\" ] || [ \"$$code\" = \"401\" ]"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    extra_hosts:
      - "host.docker.internal:host-gateway"
