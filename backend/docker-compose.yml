services:
  spring-blue:
    profiles:
      - prod
    image: eclipse-temurin:21-jdk
    container_name: spring-blue
    command: ["sh", "-c", "sleep infinity"]
    restart: unless-stopped
    env_file:
      - ../.env.prod
    networks:
      - prod-net

  spring-green:
    profiles:
      - prod
    image: eclipse-temurin:21-jdk
    container_name: spring-green
    command: ["sh", "-c", "sleep infinity"]
    restart: unless-stopped
    env_file:
      - ../.env.prod
    networks:
      - prod-net

  dev-spring:
    profiles:
      - dev
    image: eclipse-temurin:21-jdk
    container_name: dev-spring
    restart: unless-stopped
    env_file:
      - ../.env.dev
    working_dir: /workspace
    command: ["sh", "-c", "chmod +x ./gradlew && ./gradlew bootRun --no-daemon"]
    ports:
      - "127.0.0.1:${DEV_SPRING_PUBLISHED_PORT:-18085}:${DEV_SPRING_PORT:-8085}"
    expose:
      - "${DEV_SPRING_PORT:-8085}"
    environment:
      SERVER_PORT: ${DEV_SPRING_PORT:-8085}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      REDIS_HOST: ${DEV_REDIS_HOST:-dev-redis}
      REDIS_PORT: ${DEV_REDIS_PORT:-6379}
      GRADLE_USER_HOME: /root/.gradle
      TZ: Asia/Seoul
    volumes:
      - ./:/workspace
      - backend-gradle-cache:/root/.gradle
    networks:
      - dev-net
      - common-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:${DEV_SPRING_PORT:-8085}/health || true); [ \"$$code\" = \"200\" ] || [ \"$$code\" = \"401\" ]"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  prod-net:
    external: true
  dev-net:
    external: true
  common-net:
    external: true

volumes:
  backend-gradle-cache:
