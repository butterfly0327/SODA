events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  resolver 127.0.0.11 valid=10s ipv6=off;
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  include /etc/nginx/conf.d/upstream.conf;

  server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /health {
      access_log off;
      return 200 "ok\n";
    }

    location = /nginx_status {
      stub_status;
      access_log off;
      allow 127.0.0.1;
      allow 172.16.0.0/12;
      deny all;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location /health {
      access_log off;
      return 200 "ok\n";
    }

    location = /nginx_status {
      stub_status;
      access_log off;
      allow 127.0.0.1;
      allow 172.16.0.0/12;
      deny all;
    }

    location = /jenkins {
      return 301 /jenkins/;
    }

    location = /grafana {
      return 301 /grafana/;
    }

    location /jenkins/ {
      proxy_pass http://j14e105a.p.ssafy.io:18080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Forwarded-Prefix /jenkins;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_buffering off;
    }

    location /grafana/ {
      proxy_pass http://j14e105a.p.ssafy.io:8100;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Forwarded-Prefix /grafana;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_buffering off;
    }

    location = /internal/prod/spring-blue/actuator/prometheus {
      allow 127.0.0.1;
      allow 172.26.1.254;
      deny all;
      set $spring_blue_metrics spring-blue:8081;
      proxy_pass http://$spring_blue_metrics/actuator/prometheus;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /internal/prod/spring-green/actuator/prometheus {
      allow 127.0.0.1;
      allow 172.26.1.254;
      deny all;
      set $spring_green_metrics spring-green:8082;
      proxy_pass http://$spring_green_metrics/actuator/prometheus;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /internal/dev/spring/actuator/prometheus {
      allow 127.0.0.1;
      allow 172.26.1.254;
      deny all;
      set $dev_spring_metrics dev-spring:8085;
      proxy_pass http://$dev_spring_metrics/actuator/prometheus;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /internal/prod/fastapi/metrics {
      allow 127.0.0.1;
      allow 172.26.1.254;
      deny all;
      set $prod_fastapi_metrics fastapi-prod:8083;
      proxy_pass http://$prod_fastapi_metrics/metrics;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /internal/dev/fastapi/metrics {
      allow 127.0.0.1;
      allow 172.26.1.254;
      deny all;
      set $dev_fastapi_metrics fastapi-dev:8086;
      proxy_pass http://$dev_fastapi_metrics/metrics;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /internal/dev/rabbitmq/metrics {
      allow 127.0.0.1;
      allow 172.26.1.254;
      deny all;
      set $dev_rabbitmq_metrics rabbitmq:15692;
      proxy_pass http://$dev_rabbitmq_metrics/metrics;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      set $prod_was spring-blue:8081;
      rewrite ^/api/?(.*)$ /$1 break;
      proxy_pass http://$prod_was;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /rag/ {
      set $prod_rag fastapi-prod:8083;
      rewrite ^/rag/?(.*)$ /v1/rag/$1 break;
      proxy_pass http://$prod_rag;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location = /rag/health {
      set $prod_rag fastapi-prod:8083;
      rewrite ^ /v1/health break;
      proxy_pass http://$prod_rag;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dev/api/ {
      set $dev_was dev-spring:8085;
      rewrite ^/dev/api/?(.*)$ /$1 break;
      proxy_pass http://$dev_was;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /dev/rag/ {
      set $dev_rag fastapi-dev:8086;
      rewrite ^/dev/rag/?(.*)$ /v1/rag/$1 break;
      proxy_pass http://$dev_rag;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location = /dev/rag/health {
      set $dev_rag fastapi-dev:8086;
      rewrite ^ /v1/health break;
      proxy_pass http://$dev_rag;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dev/objects/ {
      set $dev_objects minio:9000;
      rewrite ^/dev/objects/?(.*)$ /$1 break;
      proxy_pass http://$dev_objects;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dev/ {
      set $dev_front dev-frontend:5173;
      proxy_pass http://$dev_front;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location / {
      set $prod_front prod-frontend:80;
      proxy_pass http://$prod_front;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
