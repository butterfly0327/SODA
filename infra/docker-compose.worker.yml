services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    restart: unless-stopped
    env_file:
      - ../.env.dev
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-soda}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change-me}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-dev}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - common-net

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    restart: unless-stopped
    volumes:
      - jenkins-home:/var/jenkins_home
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/login > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ci-net

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/datasources/dev.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/login > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - monitoring-net

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    restart: unless-stopped
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - monitoring-net

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/promtail -version > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - monitoring-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/metrics > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - monitoring-net

networks:
  common-net:
    external: true
  monitoring-net:
    external: true
  ci-net:
    external: true

volumes:
  rabbitmq-data:
  jenkins-home:
  prometheus-data:
  grafana-data:
