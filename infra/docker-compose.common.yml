services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ${NGINX_SSL_CERT_PATH:?Set NGINX_SSL_CERT_PATH in root .env.prod}:/etc/nginx/certs/fullchain.pem:ro
      - ${NGINX_SSL_KEY_PATH:?Set NGINX_SSL_KEY_PATH in root .env.prod}:/etc/nginx/certs/privkey.pem:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - prod-net
      - dev-net
      - monitoring-net

  promtail-s1:
    image: grafana/promtail:3.0.0
    container_name: promtail-s1
    command: ["-config.file=/etc/promtail/config.yml"]
    profiles: ["prod"]
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail.s1.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    ports:
      - "19081:9080"
    networks:
      - monitoring-net

  cadvisor-s1:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor-s1
    profiles: ["prod"]
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "19180:8080"
    networks:
      - monitoring-net

  node-exporter-s1:
    image: quay.io/prometheus/node-exporter:v1.8.2
    container_name: node-exporter-s1
    profiles: ["prod"]
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "19100:9100"
    networks:
      - monitoring-net

  nginx-prometheus-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: nginx-prometheus-exporter
    profiles: ["prod"]
    restart: unless-stopped
    command:
      - -nginx.scrape-uri=http://nginx/nginx_status
    ports:
      - "19113:9113"
    networks:
      - monitoring-net

networks:
  prod-net:
    external: true
  dev-net:
    external: true
  monitoring-net:
    external: true
